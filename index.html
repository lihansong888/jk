<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>接口说明</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, sans-serif;
        }
        body {
            background: #ffffff;
            color: #000000;
            padding: 20px;
            line-height: 1.8;
        }
    </style>
</head>
<body>
    <div id="desc">
        ✅ 将本网页地址放进软件接口里就可以了。<br>
        ✅ 点播源放点播接口，直播源放直播接口。<br>
        © <span id="myurl"></span>
    </div>

    <script>
        // ========== 配置区（你只需要改这里） ==========
        const VOD_SOURCE = "https://你的点播源地址.m3u8"; // 替换成你的点播源
        const LIVE_SOURCE = "https://你的直播源地址.m3u8"; // 替换成你的直播源
        // ==============================================

        // 自动显示当前页面地址
        document.getElementById("myurl").innerText = window.location.href;

        // 识别是否为影视软件（TVBox/影视仓等）
        const ua = navigator.userAgent.toLowerCase();
        const isMediaApp = ua.includes("tvbox") || 
                           ua.includes("影视仓") || 
                           ua.includes("box") ||
                           ua.includes("catvod") ||
                           ua.includes("fongmi");

        // 如果是影视软件访问 → 返回源内容
        if (isMediaApp) {
            // 这里可以根据请求类型返回点播/直播源，简化版直接返回点播源
            document.body.innerHTML = VOD_SOURCE;
            // 如果要做直播源，把上面一行改成：document.body.innerHTML = LIVE_SOURCE;
        }
        // 否则（浏览器打开）→ 只显示说明文字
        else {
            document.getElementById("desc").style.display = "block";
        }
    </script>
</body>
</html>

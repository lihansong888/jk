<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线😶‍🌫️隐身接口🫥生成工具</title>
    <style>
        p { font-size: 13px; color: #666; }
        body {font-family:"Microsoft YaHei"; font-weight: 300; margin: 2px;background-color: #eee; }
        button { font-size: 16px; padding: 5px 10px; background-color: #000; color: #fff; border: none; border-radius: 3px; cursor: pointer;}
        textarea { opacity: 0.8; font-size:11px; width:96%; }
    </style>
</head>
<body>
    <br>
    <h2>🦍<u>接口隐身</u></h2>
    <p>🐻‍❄️<u>直播</u> 源和 <u>点播</u> 源一键<b>隐身</b>！</p>

    <div id="txtSection">
        <textarea id="content" rows="12" placeholder="在此粘贴接口内容..."></textarea>
    </div>
    <br>
    密 码：<input type="text" id="password" style="width:150px;"> 
    <br>
    文件名：<input type="text" id="filename" style="width:150px;">
    <br><br>
    <button type="button" onclick="saveToVercel()"> 转为链接 </button>

    <div id="linkDisplay" style="margin-top:20px; padding:10px; background:#fff; width:94%; word-break: break-all;">
        生成的隐身链接：<br>
        <a id="linkAnchor" href="#" target="_blank"></a>
    </div>

    <script>
        // Vercel 专用逻辑：利用 localStorage 先实现单机可用，API 稍后跟进
        function saveToVercel() {
            const content = document.getElementById('content').value;
            const filename = document.getElementById('filename').value;
            const password = document.getElementById('password').value;

            if(!content || !filename) { alert('内容和文件名不能为空'); return; }

            // 这里暂时先存本地，等 API 部署好后把 fetch 放这
            const data = { content, password };
            localStorage.setItem(filename, JSON.stringify(data));

            const shareLink = window.location.origin + window.location.pathname + '?id=' + filename;
            document.getElementById('linkAnchor').href = shareLink;
            document.getElementById('linkAnchor').textContent = shareLink;
            alert('生成成功！(当前为测试模式)');
        }

        // 自动解析 URL 参数
        window.onload = function() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(id) {
                const stored = localStorage.getItem(id);
                if(stored) {
                    const data = JSON.parse(stored);
                    document.body.innerHTML = `<pre style="white-space: pre-wrap; word-wrap: break-word;">${data.content}</pre>`;
                } else {
                    document.body.innerHTML = "接口已隐身，未找到内容。";
                }
            }
        }
    </script>
</body>
</html>

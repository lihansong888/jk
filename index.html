<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>接口生成器</title>
    <style>
        body { font-family: sans-serif; padding: 20px; max-width: 600px; margin: auto; }
        textarea { width: 100%; height: 150px; margin-bottom: 10px; }
        input { width: 100%; padding: 8px; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #000; color: #fff; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <h2>隐身接口生成</h2>
    <textarea id="content" placeholder="粘贴你的接口内容..."></textarea>
    <input type="text" id="filename" placeholder="存为什么文件名？(如: live)">
    <button onclick="save()">生成并跳转</button>

    <script>
        async function save() {
            const content = document.getElementById('content').value;
            const id = document.getElementById('filename').value;
            if(!content || !id) return alert('全填上再点');

            const res = await fetch('/api/index', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ id, content })
            });

            if(res.ok) {
                // 生成后直接带你去那个地址看看
                window.location.href = `/api/index?id=${id}`;
            } else {
                alert('保存失败，请刷新重试');
            }
        }
    </script>
</body>
</html>

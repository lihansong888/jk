<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>在线😶‍🌫️隐身接口🫥生成工具</title>
    <style>
        p { font-size: 13px; color: #666; }
        body {font-family:"Microsoft YaHei"; font-weight: 300; margin: 2px;background-color: #eee; }
        button { font-size: 16px; padding: 4px 10px; background-color: #000; color: #fff; border: none; border-radius: 3px; cursor: pointer; margin-top: 5px;}
        .btn-read { background-color: #555; } /* 读取按钮颜色稍浅 */
        textarea { opacity: 0.8; font-size:11px; width: 96%; height: 200px; border: 1px solid #ccc; display: block; margin-bottom: 5px;}
        input { border: 1px solid #ccc; padding: 4px; width: 160px; margin-bottom: 5px;}
        #linkArea { margin: 10px 0; padding: 10px; background: #fff; width: 94%; min-height: 40px; word-break: break-all; border: 1px dashed #000; }
        a { color: blue; text-decoration: none; }
    </style>
</head>
<body><br>
    <h2>🦍<u>接口隐身</u></h2>
    <p>🐻‍❄️<u>直播</u> 源和 <u>点播</u> 源都可以一键<b>隐身</b>！</p>

    <textarea id="content" placeholder="在此粘贴你的接口内容..."></textarea>
    
    <div>
        密 码 (Token)：<br>
        <input type="password" id="ghToken" placeholder="GitHub Token">
    </div>
    <div>
        文件名：<br>
        <input type="text" id="filename" placeholder="比如: CR">
        <button type="button" class="btn-read" onclick="readFromCloud()">读取内容</button>
    </div>
    
    <button type="button" onclick="saveToCloud()" style="font-size:18px; width: 98%;"> 转为链接并保存</button>

    <div id="linkArea">
        <strong>生成的链接（直连加速）：</strong><br>
        <a id="finalLink" href="" target="_blank"></a>
    </div>
    
    <p>💡 提示：输入文件名和Token点“读取”可找回之前的内容。</p>

    <script>
        const repo = "lihansong888/jk";

        // --- 功能 1：读取/找回已有文件 ---
        async function readFromCloud() {
            const token = document.getElementById('ghToken').value.trim();
            const id = document.getElementById('filename').value.trim();
            if(!token || !id) return alert('请先填入 Token 和 文件名！');

            const apiUrl = `https://api.github.com/repos/${repo}/contents/data/${id}.txt`;
            
            try {
                const res = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                if (res.ok) {
                    const data = await res.json();
                    // 解码 Base64 并填入 textarea
                    const decodedContent = decodeURIComponent(escape(atob(data.content)));
                    document.getElementById('content').value = decodedContent;
                    alert('📂 内容已找回，请修改。');
                } else {
                    alert('未找到该文件，请确认文件名和 Token 是否正确。');
                }
            } catch (e) {
                alert('读取出错，请检查网络');
            }
        }

        // --- 功能 2：保存/更新文件 ---
        async function saveToCloud() {
            const token = document.getElementById('ghToken').value.trim();
            const id = document.getElementById('filename').value.trim();
            const content = document.getElementById('content').value.trim();

            if(!token || !id || !content) return alert('Token、文件名、内容全都要填！');

            const base64Content = btoa(unescape(encodeURIComponent(content)));
            const apiUrl = `https://api.github.com/repos/${repo}/contents/data/${id}.txt`;

            try {
                const getRes = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                
                let sha = "";
                if (getRes.ok) {
                    const fileData = await getRes.json();
                    sha = fileData.sha;
                }

                const res = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 
                        'Authorization': `token ${token}`, 
                        'Content-Type': 'application/json' 
                    },
                    body: JSON.stringify({
                        message: `update ${id}`,
                        content: base64Content,
                        sha: sha || undefined
                    })
                });

                if(res.ok) {
                    const fastUrl = `https://cdn.jsdelivr.net/gh/${repo}/data/${id}.txt`;
                    document.getElementById('finalLink').href = fastUrl;
                    document.getElementById('finalLink').textContent = fastUrl;
                    alert('🎉 保存成功！');
                } else {
                    alert('失败：请检查 Token 权限');
                }
            } catch (e) {
                alert('网络波动，请检查网络');
            }
        }
    </script>
</body>
</html>

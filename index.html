<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>еңЁзәҝрҹҳ¶вҖҚрҹҢ«пёҸйҡҗиә«жҺҘеҸЈрҹ«Ҙз”ҹжҲҗе·Ҙе…·</title>
    <style>
        p { font-size: 12px; color: #666; margin: 5px 0; }
        body {font-family:"Microsoft YaHei"; font-weight: 300; margin: 5px; background-color: #eee; }
        button { font-size: 16px; padding: 6px 12px; background-color: #000; color: #fff; border: none; border-radius: 3px; cursor: pointer;}
        textarea { opacity: 0.8; font-size:12px; width: 96%; height: 230px; border: 1px solid #ccc; display: block; margin-bottom: 8px;}
        input { border: 1px solid #ccc; padding: 6px; width: 85%; margin-bottom: 8px; border-radius: 3px;}
        #linkArea { margin: 10px 0; padding: 10px; background: #fff; width: 92%; min-height: 40px; word-break: break-all; border: 1px dashed #000; font-size: 13px; }
        .row { margin-bottom: 5px; font-weight: bold; font-size: 14px;}
    </style>
</head>
<body><br>
    <h2>рҹҰҚ<u>жҺҘеҸЈйҡҗиә«</u></h2>
    <p>рҹҗ»вҖҚвқ„пёҸиҫ“е…ҘдҝЎжҒҜеҸҜ<b>жүҫеӣһ</b>жҲ–<b>иҰҶзӣ–</b>дә‘з«Ҝж–Үд»¶гҖӮ</p>

    <textarea id="content" placeholder="еңЁжӯӨзІҳиҙҙдҪ зҡ„жҺҘеҸЈеҶ…е®№..."></textarea>
    
    <div class="row">GitHub з”ЁжҲ·еҗҚпјҡ</div>
    <input type="text" id="ghUser" placeholder="дҫӢеҰӮ: lihansong888">

    <div class="row">еҜҶ з Ғ (Token)пјҡ</div>
    <input type="password" id="ghToken" placeholder="иҫ“е…Ҙ ghp_ ејҖеӨҙзҡ„еҜҶй’Ҙ">

    <div class="row">ж–Үд»¶еҗҚпјҡ</div>
    <input type="text" id="filename" placeholder="дҫӢеҰӮ: CR" style="width: 55%;">
    <button type="button" style="background:#555; font-size:14px; padding: 5px;" onclick="readFromCloud()">иҜ»еҸ–еҶ…е®№</button>
    
    <button type="button" onclick="saveToCloud()" style="font-size:18px; width: 98%; height: 50px; margin-top: 15px; background: #000;"> иҪ¬дёәй“ҫжҺҘе№¶дҝқеӯҳ</button>

    <div id="linkArea">
        <strong>з”ҹжҲҗзҡ„еҠ йҖҹй“ҫжҺҘпјҡ</strong><br>
        <a id="finalLink" href="" target="_blank" style="color: blue; text-decoration: none;"></a>
    </div>

    <script>
        // иҺ·еҸ– API еҹәзЎҖи·Ҝеҫ„
        function getApiUrl() {
            const user = document.getElementById('ghUser').value.trim();
            const id = document.getElementById('filename').value.trim();
            // з»ҹдёҖеӯҳж”ҫеңЁз”ЁжҲ·зҡ„ jk д»“еә“дёӢзҡ„ data ж–Үд»¶еӨ№еҶ…
            return `https://api.github.com/repos/${user}/jk/contents/data/${id}.txt`;
        }

        // --- еҠҹиғҪ 1пјҡиҜ»еҸ–ж–Үд»¶ ---
        async function readFromCloud() {
            const token = document.getElementById('ghToken').value.trim();
            if(!token) return alert('еҝ…йЎ»еЎ«е…Ҙ Token жүҚиғҪиҜ»еҸ–пјҒ');
            
            try {
                const res = await fetch(getApiUrl(), {
                    headers: { 'Authorization': `token ${token}`, 'Cache-Control': 'no-cache' }
                });
                if (res.ok) {
                    const data = await res.json();
                    // и§ЈеҶідёӯж–Үд№ұз Ғзҡ„ Base64 и§Јз Ғж–№ејҸ
                    const decoded = decodeURIComponent(escape(atob(data.content)));
                    document.getElementById('content').value = decoded;
                    alert('рҹ“Ӯ ж–Үд»¶иҜ»еҸ–жҲҗеҠҹпјҒ');
                } else {
                    alert('иҜ»еҸ–еӨұиҙҘпјҡиҜ·зЎ®и®ӨиҜҘз”ЁжҲ·дёӢеӯҳеңЁ jk д»“еә“дё”ж–Үд»¶еҗҚжӯЈзЎ®гҖӮ');
                }
            } catch (e) { alert('иҜ»еҸ–ејӮеёёпјҢиҜ·жЈҖжҹҘзҪ‘з»ң'); }
        }

        // --- еҠҹиғҪ 2пјҡиҰҶзӣ–дҝқеӯҳ ---
        async function saveToCloud() {
            const user = document.getElementById('ghUser').value.trim();
            const token = document.getElementById('ghToken').value.trim();
            const id = document.getElementById('filename').value.trim();
            const content = document.getElementById('content').value.trim();

            if(!user || !token || !id || !content) return alert('жүҖжңүйЎ№йғҪиҰҒеЎ«пјҒ');

            const base64Content = btoa(unescape(encodeURIComponent(content)));
            const apiUrl = getApiUrl();

            try {
                // е…ҲжӢҝ SHA жүҚиғҪиҰҶзӣ–
                const getRes = await fetch(apiUrl, {
                    headers: { 'Authorization': `token ${token}` }
                });
                let sha = getRes.ok ? (await getRes.json()).sha : "";

                const res = await fetch(apiUrl, {
                    method: 'PUT',
                    headers: { 'Authorization': `token ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        message: `update by tool`,
                        content: base64Content,
                        sha: sha || undefined
                    })
                });

                if(res.ok) {
                    const fastUrl = `https://cdn.jsdelivr.net/gh/${user}/jk/data/${id}.txt`;
                    document.getElementById('finalLink').href = fastUrl;
                    document.getElementById('finalLink').textContent = fastUrl;
                    alert('рҹҺү дҝқеӯҳжҲҗеҠҹпјҒж—§ж–Үд»¶е·ІиҰҶзӣ–гҖӮ');
                } else {
                    alert('дҝқеӯҳеӨұиҙҘпјҡиҜ·жЈҖжҹҘ Token жқғйҷҗпјҲйңҖеӢҫйҖү repoпјүгҖӮ');
                }
            } catch (e) { alert('зҪ‘з»ңиҝһжҺҘй”ҷиҜҜ'); }
        }
    </script>
</body>
</html>
